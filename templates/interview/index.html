{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">

        <h1>🎤 AI Voice Interview Simulator</h1>

        <p class="text-muted">
            Practice Real-Time Technical + HR Interview
        </p>

        <!-- Role Selection -->

        <select
            id="role"
            class="form-select">

            <option>Cyber Security Analyst</option>
            <option>Network Engineer</option>
            <option>Software Engineer</option>
            <option>Cloud Engineer</option>
            <option>Data Analyst</option>
            <option>DevOps Engineer</option>

        </select>

        <!-- Resume Upload -->

        <div class="mt-4">

            <label class="form-label">
                Upload Resume PDF (Optional)
            </label>

            <input
                type="file"
                id="resumePdf"
                class="form-control"
                accept=".pdf">

            <button
                class="btn btn-info mt-3"
                onclick="uploadResume()">

                📄 Upload Resume

            </button>

        </div>

        <!-- Resume Text -->

        <div class="mt-3">

            <label class="form-label">
                Resume Text
            </label>

            <textarea
                id="resumeText"
                class="form-control"
                rows="6"
                placeholder="Resume text will appear here...">
            </textarea>

        </div>

        <!-- Buttons -->

        <div class="mt-4">

            <button
                class="btn btn-primary"
                onclick="startInterview()">

                Start Interview

            </button>

            <button
                class="btn btn-success"
                onclick="startVoiceRecognition()">

                🎙 Start Speaking

            </button>

            <button
                class="btn btn-danger"
                onclick="generateResumeQuestion()">

                Resume Based Question

            </button>

        </div>

        <hr>

        <!-- Current Question -->

        <div class="card p-3 mt-3">

            <h4>
                Current Question
            </h4>

            <div id="question">

                Waiting...

            </div>

        </div>

        <!-- Answer Box -->

        <textarea
            id="answer"
            class="form-control mt-3"
            rows="6"
            placeholder="Your answer will appear here">
        </textarea>

        <!-- Submit -->

        <button
            class="btn btn-warning mt-3"
            onclick="submitAnswer()">

            Submit Answer

        </button>

        <hr>

        <!-- Result -->

        <div id="result">

        </div>

        <!-- Score Card -->

        <div class="card mt-4 p-3">

            <h3>Interview Score</h3>

            <div id="scoreCard">

                Waiting For Evaluation...

            </div>

        </div>

        <!-- Progress -->

        <div class="mt-4">

            <h5>
                Interview Progress
            </h5>

            <div class="progress">

                <div
                    id="progressBar"
                    class="progress-bar progress-bar-striped progress-bar-animated"
                    style="width:0%">

                    0%

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/interview.js') }}"></script>

<script>

async function uploadResume(){

    let file =
    document.getElementById(
        "resumePdf"
    ).files[0];

    if(!file){

        alert(
            "Please Select Resume PDF"
        );

        return;
    }

    let formData =
    new FormData();

    formData.append(
        "resume",
        file
    );

    try{

        let response =
        await fetch(
            "/interview/upload-resume",
            {
                method:"POST",
                body:formData
            }
        );

        let data =
        await response.json();

        if(data.success){

            document.getElementById(
                "resumeText"
            ).value =
            data.resume_text;

            alert(
                "Resume Uploaded Successfully"
            );

        }else{

            alert(
                "Resume Upload Failed"
            );

        }

    }catch(error){

        console.error(error);

        alert(
            "Server Error"
        );

    }

}

</script>

{% endblock %}
