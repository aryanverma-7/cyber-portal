{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow p-4">

<h1> GATE Doubt Solver</h1>

<div class="row mt-3">

<div class="col-md-4">

<select
id="subject"
class="form-select">

<option>Operating System</option>
<option>DBMS</option>
<option>Computer Networks</option>
<option>Data Structures</option>
<option>Algorithms</option>
<option>Computer Organization</option>
<option>Theory of Computation</option>
<option>Compiler Design</option>
<option>Digital Logic</option>
<option>Discrete Mathematics</option>
<option>Engineering Mathematics</option>
<option>Aptitude</option>

</select>

</div>

<div class="col-md-4">

<select
id="level"
class="form-select">

<option>Easy</option>
<option>Medium</option>
<option>GATE PYQ Level</option>

</select>

</div>

</div>

<input
id="question"
type="text"
class="form-control mt-3"
placeholder="Ask your GATE doubt">

<div class="mt-3">

<button
class="btn btn-success"
onclick="solveQuestion()">

Solve Doubt

</button>


<div
id="result"
class="mt-4">
</div>

</div>

</div>

<script>

function fillDeadlock(){
document.getElementById("question").value =
"What is Deadlock?";
}

function fillTCP(){
document.getElementById("question").value =
"What is TCP?";
}

function fillDBMS(){
document.getElementById("question").value =
"What is Normalization?";
}

async function solveQuestion(){

    let question =
    document.getElementById(
        "question"
    ).value;

    document.getElementById(
        "result"
    ).innerHTML =
    `
    <div class="alert alert-info">
        Analyzing...
    </div>
    `;

    const response =
    await fetch(
        "/gate/solve",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                question:question,
                subject:document.getElementById("subject").value,
                level:document.getElementById("level").value
            })
        }
    );

    const data =
    await response.json();

    let formattedAnswer =
        data.answer
            .replace(/\*\*/g,"")
            .replace(/###/g,"")
            .replace(/##/g,"")
            .replace(/---/g,"")
            .replace(/===/g,"")
            .replace(/\n/g,"<br>");

    document.getElementById(
        "result"
    ).innerHTML =
    `
    <div class="card shadow p-4">

        <h3 class="mb-3">
            GATE Solution
        </h3>

        <hr>

        <div style="
            line-height:2;
            font-size:16px;
        ">
            ${formattedAnswer}
        </div>

    </div>
    `;
}

</script>

{% endblock %}
