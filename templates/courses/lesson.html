{% extends "base.html" %}

{% block title %}
{{ lesson.title }}
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">

        <h1>{{ lesson.title }}</h1>

        <hr>

        <div class="mb-4">
            {{ lesson.content|safe }}
        </div>

        <div class="card mt-4 p-3">

            <h3> AI Lesson Tutor</h3>

            <button
                class="btn btn-primary mb-2"
                onclick="explainLesson()">

                Explain Lesson

            </button>

            <button
                class="btn btn-warning"
                onclick="generateQuiz()">

                Generate Quiz

            </button>

            <div
                id="ai-result"
                class="mt-3">
            </div>

        </div>

    </div>

</div>

<script>

async function explainLesson() {

    const resultBox =
        document.getElementById("ai-result");

    resultBox.innerHTML =
        "<div class='alert alert-info'>Generating AI explanation...</div>";

    try {

        const response = await fetch(
            "/course/ai-explain",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    topic: "{{ lesson.title }}"
                })
            }
        );

        if (!response.ok) {

            throw new Error(
                "Server Error: " + response.status
            );
        }

        const text =
            await response.text();

        let data;

        try {

            data = JSON.parse(text);

        } catch {

            resultBox.innerHTML =
                `
                <div class="alert alert-danger">
                    Invalid response received from server.
                    <br><br>
                    ${text}
                </div>
                `;

            return;
        }

        resultBox.innerHTML =
`
            <div class="card p-4 shadow">

                <h4 class="text-info">
                    📘 AI Explanation
                </h4>

                <hr>

                <div class="ai-response">

                    ${data.answer}

                </div>

            </div>
            `;

    } catch (error) {

        resultBox.innerHTML =
            `
            <div class="alert alert-danger">
                ${error.message}
            </div>
            `;
    }
}

async function generateQuiz() {

    const resultBox =
        document.getElementById("ai-result");

    resultBox.innerHTML =
        "<div class='alert alert-warning'>Generating Quiz...</div>";

    try {

        const response = await fetch(
            "/course/ai-quiz",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    topic: "{{ lesson.title }}"
                })
            }
        );

        if (!response.ok) {

            throw new Error(
                "Server Error: " + response.status
            );
        }

        const text =
            await response.text();

        let data;

        try {

            data = JSON.parse(text);

        } catch {

            resultBox.innerHTML =
                `
                <div class="alert alert-danger">
                    Invalid response received from server.
                    <br><br>
                    ${text}
                </div>
                `;

            return;
        }

        resultBox.innerHTML =
`
            <div class="card p-4 shadow">

                <h4 class="text-warning">
                     Generated Quiz
                </h4>

                <hr>

                <div class="ai-response">

                    ${data.quiz}

                </div>

            </div>
            `;

    } catch (error) {

        resultBox.innerHTML =
            `
            <div class="alert alert-danger">
                ${error.message}
            </div>
            `;
    }
}

</script>

{% endblock %}
