{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card p-4 shadow">

<h1>ATS Resume Reviewer</h1>

<p class="text-muted">
Paste Resume OR Upload PDF
</p>

<textarea
id="resume"
class="form-control mt-3"
rows="12"
placeholder="Paste Resume Here">
</textarea>

<div class="mt-3">

<label class="form-label">

Upload Resume PDF

</label>

<input
type="file"
id="resumePdf"
class="form-control"
accept=".pdf">

</div>

<button
class="btn btn-primary mt-3 w-100"
onclick="analyzeResume()">

Analyze Resume

</button>

<div
id="result"
class="mt-4">
</div>

</div>

</div>

<script>

async function analyzeResume(){

    let resume =
    document.getElementById(
        "resume"
    ).value.trim();

    const pdfFile =
    document.getElementById(
        "resumePdf"
    ).files[0];

    try{

        if(
            !resume &&
            pdfFile
        ){

            let formData =
            new FormData();

            formData.append(
                "resume",
                pdfFile
            );

            document.getElementById(
                "result"
            ).innerHTML =
            `
            <div class="alert alert-info">
                Reading PDF...
            </div>
            `;

            let pdfResponse =
            await fetch(
                "/resume/upload-pdf",
                {
                    method:"POST",
                    body:formData
                }
            );

            let pdfData =
            await pdfResponse.json();

            if(
                !pdfData.success
            ){

                throw new Error(
                    pdfData.message
                );
            }

            resume =
            pdfData.resume_text;
        }

        if(!resume){

            document.getElementById(
                "result"
            ).innerHTML =
            `
            <div class="alert alert-warning">
                Paste Resume OR Upload PDF
            </div>
            `;

            return;
        }

        document.getElementById(
            "result"
        ).innerHTML =
        `
        <div class="alert alert-info">
            Analyzing Resume...
        </div>
        `;

        let response =
        await fetch(
            "/resume/analyze",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    resume:resume
                })
            }
        );

        let data =
        await response.json();

        document.getElementById(
            "result"
        ).innerHTML =
        `
        <div class="card p-4">

            <h2>
                ATS Score:
                ${data.score}/100
            </h2>

            <h4>
                ${data.level}
            </h4>

            <hr>

            <h4>
                Skills Found
            </h4>

            <ul>

            ${
                data.skills.map(
                    s =>
                    `<li>${s}</li>`
                ).join("")
            }

            </ul>

            <hr>

            <h4>
                Missing Skills
            </h4>

            <ul>

            ${
                data.missing_skills.map(
                    s =>
                    `<li>${s}</li>`
                ).join("")
            }

            </ul>

            <hr>

            <h4>
                Suggestions
            </h4>

            <ul>

            ${
                data.suggestions.map(
                    s =>
                    `<li>${s}</li>`
                ).join("")
            }

            </ul>

        </div>
        `;

    }
    catch(error){

        document.getElementById(
            "result"
        ).innerHTML =
        `
        <div class="alert alert-danger">

            ${error}

        </div>
        `;
    }
}

</script>

{% endblock %}
