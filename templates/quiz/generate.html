{% extends "base.html" %}

{% block title %}
AI Quiz Generator
{% endblock %}

{% block content %}

<div class="container mt-4">

    <h1 class="text-info">
        AI Quiz Generator
    </h1>

    <div class="card p-4">

        <input
            type="text"
            id="topic"
            class="form-control mb-3"
            placeholder="Enter Topic">

        <select
            id="difficulty"
            class="form-control mb-3">

            <option value="easy">
                Easy
            </option>

            <option value="medium">
                Medium
            </option>

            <option value="hard">
                Hard
            </option>

        </select>

        <button
            class="btn btn-primary"
            onclick="generateQuiz()">

            Generate Quiz

        </button>

    </div>

    <div
        id="result"
        class="mt-4">
    </div>

</div>

<script>

function generateQuiz(){

    fetch(
        "/quiz/generate-ai",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                topic:
                document.getElementById(
                    "topic"
                ).value,

                difficulty:
                document.getElementById(
                    "difficulty"
                ).value
            })
        }
    )
    .then(res=>res.json())
    .then(data=>{

        document.getElementById(
            "result"
        ).innerHTML =

        `
        <div class="card p-4">
            <pre>${data.result}</pre>
        </div>
        `;

    });

}

</script>

{% endblock %}
