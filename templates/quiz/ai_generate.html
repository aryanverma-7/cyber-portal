{% extends "base.html" %}

{% block title %}AI Quiz Generator{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card p-4 shadow">

        <h2> AI Quiz Generator</h2>

        <input
            id="topic"
            class="form-control mt-3"
            placeholder="Enter Topic">

        <select
            id="quizType"
            class="form-control mt-3">

            <option value="MCQ">MCQ</option>

            <option value="MSQ">MSQ</option>

            <option value="NAT">NAT</option>

            <option value="Mixed">Mixed</option>

        </select>

        <select
            id="quizLevel"
            class="form-control mt-3">

            <option value="Easy">Easy</option>

            <option value="Medium">Medium</option>

            <option value="Hard">Hard</option>

            <option value="Interview">Interview Level</option>

        </select>

        <input
            type="number"
            id="questionCount"
            class="form-control mt-3"
            value="10"
            min="1"
            max="100"
            placeholder="Number of Questions">

        <button
            onclick="generateQuiz()"
            class="btn btn-primary mt-3">

            Generate Quiz

        </button>

        <div
            id="result"
            class="mt-4">
        </div>

    </div>

</div>

<script>

async function generateQuiz(){

    let topic =
    document.getElementById(
        "topic"
    ).value;


    let quizType =
        document.getElementById(
            "quizType"
        ).value;

    let quizLevel =
        document.getElementById(
            "quizLevel"
        ).value;

    let questionCount =
        document.getElementById(
            "questionCount"
        ).value;

    if(!topic){

        alert(
            "Please enter topic"
        );

        return;
    }

    document.getElementById(
        "result"
    ).innerHTML =
    `
    <div class="alert alert-info">
        Generating Quiz...
    </div>
    `;

    try{

        let response =
        await fetch(
            "/quiz/ai-generate",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    topic:topic,

                    quiz_type:quizType,

                    quiz_level:quizLevel,

                    question_count:questionCount

                })
            }
        );

        let data =
        await response.json();

        let formattedQuiz =
        data.quiz
            .replace(/\*\*/g,"")
            .replace(/###/g,"")
            .replace(/##/g,"")
            .replace(/\n/g,"<br>")
            .replace(/=/g,"")
            .replace(/---/g,"")
            .replace(/\*/g,"");

        document.getElementById(
            "result"
        ).innerHTML =
        `
        <div class="card p-4 shadow">

            <h4 class="mb-3">
                 Generated Quiz
            </h4>

            <div style="
                line-height:2;
                font-size:16px;
            ">
                ${formattedQuiz}
            </div>

        </div>
        `;

    }

    catch(error){

        document.getElementById(
            "result"
        ).innerHTML =
        `
        <div class="alert alert-danger">
            ${error}
        </div>
        `;
    }
}


</script>

{% endblock %}
